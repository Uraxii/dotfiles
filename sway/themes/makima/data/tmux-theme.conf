# tmux theme overlay — gruvbox dark medium palette.
# Sourced by tmux from ~/.local/share/tmux/theme.conf (copied by set-theme.sh).
#
# Sets @thm_* user options read by tmux.conf pill format strings. Hot-reloaded
# on sway theme switch (set-theme.sh issues `tmux source-file` + refresh).

set -g @thm_bg      "#282828"
set -g @thm_bg2     "#3c3836"
set -g @thm_fg      "#ebdbb2"
set -g @thm_accent  "#d79921"
set -g @thm_accent2 "#8ec07c"
set -g @thm_info    "#83a598"
set -g @thm_success "#b8bb26"
set -g @thm_warning "#fabd2f"
set -g @thm_urgent  "#fb4934"
