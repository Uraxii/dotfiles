# tmux theme overlay — synthwave '84 palette.
# Sourced by tmux from ~/.local/share/tmux/theme.conf (copied by set-theme.sh).
#
# Sets @thm_* user options read by tmux.conf pill format strings. Hot-reloaded
# on sway theme switch (set-theme.sh issues `tmux source-file` + refresh).

set -g @thm_bg      "#2a2139"
set -g @thm_bg2     "#34294f"
set -g @thm_fg      "#f0eff1"
set -g @thm_accent  "#ff7edb"
set -g @thm_accent2 "#03edf9"
set -g @thm_info    "#36f9f6"
set -g @thm_success "#72f1b8"
set -g @thm_warning "#fede5d"
set -g @thm_urgent  "#fe4450"
