# tmux theme overlay — manjaro palette (catppuccin-mocha hex).
# Sourced by tmux from ~/.local/share/tmux/theme.conf (copied by set-theme.sh).
#
# Sets @thm_* user options read by tmux.conf pill format strings. Hot-reloaded
# on sway theme switch (set-theme.sh issues `tmux source-file` + refresh).

set -g @thm_bg      "#1e1e2e"
set -g @thm_bg2     "#313244"
set -g @thm_fg      "#cdd6f4"
set -g @thm_accent  "#cba6f7"
set -g @thm_accent2 "#94e2d5"
set -g @thm_info    "#89b4fa"
set -g @thm_success "#a6e3a1"
set -g @thm_warning "#f9e2af"
set -g @thm_urgent  "#f38ba8"
