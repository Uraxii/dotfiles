name: pipeline
description: Multi-role gated pipeline for the Hermes harness. Entry point /pipeline <request>. Composes intake → plan → architect → build → gates → PR publish → friction audit. Roles spawned via delegate_task; logic via pipeline-core plugin tools.

skills:
  - pipeline-orchestrator
  - pipeline-agent-brief-format
  - pipeline-handoff-doc
  - pipeline-decision-elicitation
  - pipeline-agent-preflight

instruction: |
  Entering pipeline orchestrator mode. Flow:

  1. Triage user request: direct answer vs pipeline.
  2. If pipeline: resolve canonical artifact-id via `pipeline_artifact_slug` tool.
  3. Run dir: <repo>/.pipeline/runs/<artifact-id>/.
  4. Write brief.md using the agent-brief-format template (durable-over-precise).
  5. Init pipeline.md ledger; capture base_ref + base_sha.
  6. Resolve open questions via clarify (sync) before composing.
  7. Compose dep graph via `pipeline_dep_graph_compose`.
  8. Execute roles in order via `delegate_task(goal=..., context=..., toolsets=...)`.
  9. Route gate verdicts via `pipeline_verdict_parse` + `pipeline_revision_route`.
  10. Publish PRs (orchestrator-owned). Invoke `pipeline_friction_audit` post-PR.

  All revision spawns fresh delegate_task — continuity via mandatory handoff-<role>-r<N>.md (port plan Doctrine delta #1).

  Decision elicitation: sync via clarify (root only). Async via Discord text-reply `!decide <run_id>:d<N> <index>` (decision-router gateway hook handles).

  Sentinel parsing on first turn: <<resume-pipeline-<id>>> / resume <id> / use plan <id>.
