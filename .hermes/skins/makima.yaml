spinner:
  waiting_faces:
    - "(mk)"
    - "(--)"
    - "(..)"
    - "(==)"
  thinking_faces:
    - "(mk)"
    - "(..)"
    - "(??)"
    - "(!!)"
  thinking_verbs:
    - "watching threads"
    - "pulling chains"
    - "tempering plans"
    - "reading contracts"
    - "binding context"
    - "shaping intent"
  wings:
    - ["[gold ", " gold]"]
    - ["{ctrl ", " ctrl}"]
    - ["<red ", " red>"]

branding:
  agent_name: "Makima Hermes"
  welcome: "Welcome to Makima Hermes. Type your message or /help for commands."
  goodbye: "Goodbye. Stay in control."
  response_label: " Makima Hermes "
  prompt_symbol: ">"
  help_header: "Makima commands"

tool_prefix: "|"

tool_emojis:
  terminal: ">_"
  read_file: "rd"
  write_file: "wr"
  patch: "pt"
  web_search: "ws"
  web_extract: "wx"
  delegate_task: "dg"

