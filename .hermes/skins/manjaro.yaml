spinner:
  waiting_faces:
    - "(mj)"
    - "(//)"
    - "(~~)"
    - "(**)"
  thinking_faces:
    - "(mj)"
    - "(**)"
    - "(~~)"
    - "(>>)"
  thinking_verbs:
    - "sailing midnight"
    - "threading magenta"
    - "routing teal paths"
    - "tuning plasma"
    - "shaping violet context"
    - "charting gradients"
  wings:
    - ["[neon ", " neon]"]
    - ["{violet ", " violet}"]
    - ["<teal ", " teal>"]

branding:
  agent_name: "Manjaro Hermes"
  welcome: "Welcome to Manjaro Hermes. Type your message or /help for commands."
  goodbye: "Smooth sailing."
  response_label: " Manjaro Hermes "
  prompt_symbol: ">"
  help_header: "Manjaro commands"

tool_prefix: "|"

tool_emojis:
  terminal: ">_"
  read_file: "rd"
  write_file: "wr"
  patch: "pt"
  web_search: "ws"
  web_extract: "wx"
  delegate_task: "dg"

