version = 3

[upgrade]
  source = 'cdn'
  interval = '168h'
  auto = false
  notice = false

[transient_prompt]
  background = "transparent"
  foreground = "#f5f0ff"
  template = " пҒ»{{ .Folder }}оӘң> "
  newline = false

[[blocks]]
  type = 'prompt'
  alignment = 'left'

  [[blocks.segments]]
    leading_diamond = 'в•ӯв”ҖоӮ¶'
    trailing_diamond = 'оӮҙ'
    template = ' п„ {{ .Name }} '
    foreground = '#f5f0ff'
    background = '#e6207a'
    type = 'shell'
    style = 'diamond'

  [[blocks.segments]]
    leading_diamond = 'оӮ¶'
    trailing_diamond = 'оӮҙ'
    template = ' пҠ’ '
    foreground = '#FFFB38'
    background = '#ff1493'
    type = 'root'
    style = 'diamond'

  [[blocks.segments]]
    leading_diamond = 'оӮ¶'
    trailing_diamond = 'оӮҙ'
    template = ' пҒ» оӘң{{ .Path }} '
    foreground = '#0d0b1a'
    background = '#2eb398'
    type = 'path'
    style = 'diamond'

    [blocks.segments.properties]
      folder_icon = 'пҒ»  '
      home_icon = 'оҳ—'
      style = 'folder'

  [[blocks.segments]]
    leading_diamond = 'оӮ¶'
    trailing_diamond = 'оӮҙ'
    template = ' о®ў {{ .FormattedMs }}в Җ'
    foreground = '#f5f0ff'
    background = '#1a1530'
    type = 'executiontime'
    style = 'diamond'

    [blocks.segments.properties]
      style = 'roundrock'
      threshold = 0.0

[[blocks]]
  type = 'prompt'
  alignment = 'right'

  [[blocks.segments]]
    leading_diamond = 'оӮ¶'
    trailing_diamond = 'оӮҙ'
    template = ' {{ if .WSL }}{{.Icon}}(WSL){{ end }} '
    foreground = '#0d0b1a'
    background = '#6e6580'
    type = 'os'
    style = 'diamond'

    [blocks.segments.properties]
      linux = 'оң’'
      redhat = 'уұ„ӣ'
      arch = 'у°ЈҮ'
      manjaro = 'уұҳҠ'
      ubuntu = 'у°•Ҳ'
      macos = 'оң‘'
      windows = 'оңҸ'

  [[blocks.segments]]
    leading_diamond = 'оӮ¶'
    trailing_diamond = 'оӮҙ'
    template = ' {{ if not .Error }}{{ .Icon }}{{ .Percentage }}{{ end }}{{ .Error }} '
    foreground = '#f5f0ff'
    background = '#ff1493'
    type = 'battery'
    style = 'diamond'
    background_templates = ['{{if eq "Charging" .State.String}}#b8e994{{end}}', '{{if eq "Discharging" .State.String}}{{if ge .Percentage 50}}#77DD77{{end}}{{end}}', '{{if eq "Full" .State.String}}#77DD77{{end}}']

    [blocks.segments.properties]
      charged_icon = 'у°Ғ№ '
      charging_icon = 'у°Ӯ„ '
      discharging_icon = 'у°Ғ№ '

  [[blocks.segments]]
    leading_diamond = 'оӮ¶'
    trailing_diamond = 'оӮҙ'
    template = ' пҒі {{ .CurrentDate | date .Format }} '
    foreground = '#f5f0ff'
    background = '#e6207a'
    type = 'time'
    style = 'diamond'

    [blocks.segments.properties]
      time_format = '_2,15:04'

[[blocks]]
  type = 'prompt'
  alignment = 'left'
  newline = true

  [[blocks.segments]]
    leading_diamond = 'в”ңв”ҖоӮ¶'
    trailing_diamond = 'оӮҙ'
    template = ' {{ .UpstreamIcon }}{{ .HEAD }}{{if .BranchStatus }} {{ .BranchStatus }}{{ end }}{{ if .Working.Changed }} пҒ„ {{ .Working.String }}{{ end }}{{ if and (.Working.Changed) (.Staging.Changed) }} |{{ end }}{{ if .Staging.Changed }}<#ff1493> пҒҶ {{ .Staging.String }}</>{{ end }} '
    foreground = '#0d0b1a'
    background = '#d4a017'
    type = 'git'
    style = 'diamond'
    background_templates = ['{{ if or (.Working.Changed) (.Staging.Changed) }}#c4b8d8{{ end }}', '{{ if and (gt .Ahead 0) (gt .Behind 0) }}#7b2fbe{{ end }}', '{{ if gt .Ahead 0 }}#7b2fbe{{ end }}', '{{ if gt .Behind 0 }}#7b2fbe{{ end }}']

    [blocks.segments.properties]
      branch_icon = 'оңҘ '
      fetch_status = true
      fetch_upstream_icon = true

  [[blocks.segments]]
    leading_diamond = 'оӮ¶'
    trailing_diamond = 'оӮҙ '
    template = ' оңҳ{{ if .PackageManagerIcon }}{{ .PackageManagerIcon }} {{ end }}{{ .Full }}'
    foreground = '#3C873A'
    background = '#303030'
    type = 'node'
    style = 'diamond'

    [blocks.segments.properties]
      fetch_package_manager = true
      npm_icon = ' <#cc3a3a>о—ә</> '
      yarn_icon = ' <#348cba>оҡ§</>'

  [[blocks.segments]]
    leading_diamond = 'оӮ¶'
    trailing_diamond = 'оӮҙ '
    template = ' оҲө{{ if .Error }}{{ .Error }}{{ else }}{{ if .Venv }}{{ .Venv }} {{ end }}{{ .Full }}{{ end }}'
    foreground = '#FFE873'
    background = '#306998'
    type = 'python'
    style = 'diamond'

  [[blocks.segments]]
    leading_diamond = 'оӮ¶'
    trailing_diamond = 'оӮҙ '
    template = ' оңё{{ if .Error }}{{ .Error }}{{ else }}{{ .Full }}{{ end }}'
    foreground = '#ffffff'
    background = '#0e8ac8'
    type = 'java'
    style = 'diamond'

  [[blocks.segments]]
    leading_diamond = 'оӮ¶'
    trailing_diamond = 'оӮҙ '
    template = ' оқҝ{{ if .Unsupported }}пҒұ{{ else }}{{ .Full }}{{ end }}'
    foreground = '#0d6da8'
    background = '#0e0e0e'
    type = 'dotnet'
    style = 'diamond'

  [[blocks.segments]]
    leading_diamond = 'оӮ¶'
    trailing_diamond = 'оӮҙ '
    template = ' оҳҰ{{ if .Error }}{{ .Error }}{{ else }}{{ .Full }}{{ end }}'
    foreground = '#06aad5'
    background = '#ffffff'
    type = 'go'
    style = 'diamond'

  [[blocks.segments]]
    leading_diamond = 'оӮ¶'
    trailing_diamond = 'оӮҙ '
    template = ' оһЁ{{ if .Error }}{{ .Error }}{{ else }}{{ .Full }}{{ end }}'
    foreground = '#925837'
    background = '#f3f0ec'
    type = 'rust'
    style = 'diamond'

  [[blocks.segments]]
    leading_diamond = 'оӮ¶'
    trailing_diamond = 'оӮҙ '
    template = ' оһҳ{{ if .Error }}{{ .Error }}{{ else }}{{ .Full }}{{ end }}'
    foreground = '#055b9c'
    background = '#e1e8e9'
    type = 'dart'
    style = 'diamond'

  [[blocks.segments]]
    leading_diamond = 'оӮ¶'
    trailing_diamond = 'оӮҙ '
    template = ' оқ“{{ if .Error }}{{ .Error }}{{ else }}{{ .Full }}{{ end }}'
    foreground = '#ce092f'
    background = '#ffffff'
    type = 'angular'
    style = 'diamond'

  [[blocks.segments]]
    leading_diamond = 'оӮ¶'
    trailing_diamond = 'оӮҙ '
    template = 'Оұ {{ if .Error }}{{ .Error }}{{ else }}{{ .Full }}{{ end }}'
    foreground = '#de1f84'
    background = '#ffffff'
    type = 'aurelia'
    style = 'diamond'

  [[blocks.segments]]
    leading_diamond = 'оӮ¶'
    trailing_diamond = 'оӮҙ '
    template = '{{ if .Error }}{{ .Error }}{{ else }}Nx {{ .Full }}{{ end }}'
    foreground = '#ffffff'
    background = '#1e293b'
    type = 'nx'
    style = 'diamond'

  [[blocks.segments]]
    leading_diamond = 'оӮ¶'
    trailing_diamond = 'оӮҙ '
    template = '<#ca3c34>оҳӨ</> {{ if .Error }}{{ .Error }}{{ else }}{{ .Full }}{{ end }}'
    foreground = '#359a25'
    background = '#945bb3'
    type = 'julia'
    style = 'diamond'

  [[blocks.segments]]
    leading_diamond = 'оӮ¶'
    trailing_diamond = 'оӮҙ '
    template = ' оһ‘{{ if .Error }}{{ .Error }}{{ else }}{{ .Full }}{{ end }}'
    foreground = '#9c1006'
    background = '#ffffff'
    type = 'ruby'
    style = 'diamond'

  [[blocks.segments]]
    leading_diamond = 'оӮ¶'
    trailing_diamond = 'оӮҙ '
    template = '<#f5bf45>п„„пғ§п„…</> {{ if .Error }}{{ .Error }}{{ else }}{{ .Full }}{{ end }}'
    foreground = '#5398c2'
    background = '#ffffff'
    type = 'azfunc'
    style = 'diamond'

  [[blocks.segments]]
    leading_diamond = 'оӮ¶'
    trailing_diamond = 'оӮҙ '
    template = ' оһӯ{{.Profile}}{{if .Region}}@{{.Region}}{{end}}'
    foreground = '#faa029'
    background = '#565656'
    type = 'aws'
    style = 'diamond'

  [[blocks.segments]]
    leading_diamond = 'оӮ¶'
    trailing_diamond = 'оӮҙ'
    template = ' пҢҲ{{.Context}}{{if .Namespace}} :: {{.Namespace}}{{end}}'
    foreground = '#ffffff'
    background = '#316ce4'
    type = 'kubectl'
    style = 'diamond'

[[blocks]]
  type = 'prompt'
  alignment = 'left'
  newline = true

  [[blocks.segments]]
    template = 'в•°в”Җ'
    foreground = '#e6207a'
    type = 'text'
    style = 'plain'

  [[blocks.segments]]
    template = ' оҠ…'
    foreground = '#f5f0ff'
    type = 'status'
    style = 'plain'
    foreground_templates = ['{{ if gt .Code 0 }}#ff1493{{ end }}']

    [blocks.segments.properties]
      always_enabled = true
