version = 3

[upgrade]
  source = 'cdn'
  interval = '168h'
  auto = false
  notice = false

[transient_prompt]
  background = "transparent"
  foreground = "#ffffff"
  template = "пҒ»оӘң {{ .Folder }}> "
  newline = false

[[blocks]]
  type = 'prompt'
  alignment = 'left'

  [[blocks.segments]]
    leading_diamond = 'в•ӯв”ҖоӮ¶'
    template = 'п„  {{ .Name }} '
    foreground = '#ffffff'
    background = '#0077c2'
    type = 'shell'
    style = 'diamond'

  [[blocks.segments]]
    template = '<parentBackground>оӮ°</> пҠ’ '
    foreground = '#FFFB38'
    background = '#ef5350'
    type = 'root'
    style = 'diamond'

  [[blocks.segments]]
    template = ' пҒ»оӘң {{ .Path }} '
    foreground = '#2d3436'
    powerline_symbol = 'оӮ°'
    background = '#FF9248'
    type = 'path'
    style = 'powerline'

    [blocks.segments.properties]
      folder_icon = ' пҒ» '
      home_icon = 'оҳ—'
      style = 'folder'

  [[blocks.segments]]
    template = ' {{ .UpstreamIcon }}{{ .HEAD }}{{if .BranchStatus }} {{ .BranchStatus }}{{ end }}{{ if .Working.Changed }} пҒ„ {{ .Working.String }}{{ end }}{{ if and (.Working.Changed) (.Staging.Changed) }} |{{ end }}{{ if .Staging.Changed }}<#ef5350> пҒҶ {{ .Staging.String }}</>{{ end }} '
    foreground = '#011627'
    powerline_symbol = 'оӮ°'
    background = '#FFFB38'
    type = 'git'
    style = 'powerline'
    background_templates = ['{{ if or (.Working.Changed) (.Staging.Changed) }}#ffeb95{{ end }}', '{{ if and (gt .Ahead 0) (gt .Behind 0) }}#c5e478{{ end }}', '{{ if gt .Ahead 0 }}#C792EA{{ end }}', '{{ if gt .Behind 0 }}#C792EA{{ end }}']

    [blocks.segments.properties]
      branch_icon = 'оңҘ '
      fetch_status = true
      fetch_upstream_icon = true

  [[blocks.segments]]
    trailing_diamond = 'оӮј'
    template = ' о®ў {{ .FormattedMs }}в Җ'
    foreground = '#ffffff'
    background = '#83769c'
    type = 'executiontime'
    style = 'diamond'

    [blocks.segments.properties]
      style = 'roundrock'
      threshold = 0.0

[[blocks]]
  type = 'prompt'
  alignment = 'right'

  [[blocks.segments]]
    leading_diamond = 'оӮ¶'
    trailing_diamond = 'оӮҙ '
    template = 'оңҳ {{ if .PackageManagerIcon }}{{ .PackageManagerIcon }} {{ end }}{{ .Full }}'
    foreground = '#3C873A'
    background = '#303030'
    type = 'node'
    style = 'diamond'

    [blocks.segments.properties]
      fetch_package_manager = true
      npm_icon = ' <#cc3a3a>о—ә</> '
      yarn_icon = ' <#348cba>оҡ§</>'

  [[blocks.segments]]
    leading_diamond = 'оӮ¶'
    trailing_diamond = 'оӮҙ '
    template = 'оҲө {{ if .Error }}{{ .Error }}{{ else }}{{ if .Venv }}{{ .Venv }} {{ end }}{{ .Full }}{{ end }}'
    foreground = '#FFE873'
    background = '#306998'
    type = 'python'
    style = 'diamond'

  [[blocks.segments]]
    leading_diamond = 'оӮ¶'
    trailing_diamond = 'оӮҙ '
    template = 'оңё {{ if .Error }}{{ .Error }}{{ else }}{{ .Full }}{{ end }}'
    foreground = '#ffffff'
    background = '#0e8ac8'
    type = 'java'
    style = 'diamond'

  [[blocks.segments]]
    leading_diamond = 'оӮ¶'
    trailing_diamond = 'оӮҙ '
    template = 'оқҝ {{ if .Unsupported }}пҒұ{{ else }}{{ .Full }}{{ end }}'
    foreground = '#0d6da8'
    background = '#0e0e0e'
    type = 'dotnet'
    style = 'diamond'

  [[blocks.segments]]
    leading_diamond = 'оӮ¶'
    trailing_diamond = 'оӮҙ '
    template = 'оҳҰ {{ if .Error }}{{ .Error }}{{ else }}{{ .Full }}{{ end }}'
    foreground = '#06aad5'
    background = '#ffffff'
    type = 'go'
    style = 'diamond'

  [[blocks.segments]]
    leading_diamond = 'оӮ¶'
    trailing_diamond = 'оӮҙ '
    template = 'оһЁ {{ if .Error }}{{ .Error }}{{ else }}{{ .Full }}{{ end }}'
    foreground = '#925837'
    background = '#f3f0ec'
    type = 'rust'
    style = 'diamond'

  [[blocks.segments]]
    leading_diamond = ' оӮ¶'
    trailing_diamond = 'оӮҙ '
    template = 'оһҳ {{ if .Error }}{{ .Error }}{{ else }}{{ .Full }}{{ end }}'
    foreground = '#055b9c'
    background = '#e1e8e9'
    type = 'dart'
    style = 'diamond'

  [[blocks.segments]]
    leading_diamond = ' оӮ¶'
    trailing_diamond = 'оӮҙ '
    template = 'оқ“ {{ if .Error }}{{ .Error }}{{ else }}{{ .Full }}{{ end }}'
    foreground = '#ce092f'
    background = '#ffffff'
    type = 'angular'
    style = 'diamond'

  [[blocks.segments]]
    leading_diamond = ' оӮ¶'
    trailing_diamond = 'оӮҙ '
    template = 'Оұ {{ if .Error }}{{ .Error }}{{ else }}{{ .Full }}{{ end }}'
    foreground = '#de1f84'
    background = '#ffffff'
    type = 'aurelia'
    style = 'diamond'

  [[blocks.segments]]
    leading_diamond = ' оӮ¶'
    trailing_diamond = 'оӮҙ '
    template = '{{ if .Error }}{{ .Error }}{{ else }}Nx {{ .Full }}{{ end }}'
    foreground = '#ffffff'
    background = '#1e293b'
    type = 'nx'
    style = 'diamond'

  [[blocks.segments]]
    leading_diamond = ' оӮ¶'
    trailing_diamond = 'оӮҙ '
    template = '<#ca3c34>оҳӨ</> {{ if .Error }}{{ .Error }}{{ else }}{{ .Full }}{{ end }}'
    foreground = '#359a25'
    background = '#945bb3'
    type = 'julia'
    style = 'diamond'

  [[blocks.segments]]
    leading_diamond = 'оӮ¶'
    trailing_diamond = 'оӮҙ '
    template = 'оһ‘ {{ if .Error }}{{ .Error }}{{ else }}{{ .Full }}{{ end }}'
    foreground = '#9c1006'
    background = '#ffffff'
    type = 'ruby'
    style = 'diamond'

  [[blocks.segments]]
    leading_diamond = 'оӮ¶'
    trailing_diamond = 'оӮҙ '
    template = 'п„„<#f5bf45>пғ§</>п„… {{ if .Error }}{{ .Error }}{{ else }}{{ .Full }}{{ end }}'
    foreground = '#5398c2'
    background = '#ffffff'
    type = 'azfunc'
    style = 'diamond'

  [[blocks.segments]]
    leading_diamond = 'оӮ¶'
    trailing_diamond = 'оӮҙ '
    template = 'оһӯ {{.Profile}}{{if .Region}}@{{.Region}}{{end}}'
    foreground = '#faa029'
    background = '#565656'
    type = 'aws'
    style = 'diamond'

  [[blocks.segments]]
    leading_diamond = 'оӮ¶'
    trailing_diamond = 'оӮҙ'
    template = 'пҢҲ {{.Context}}{{if .Namespace}} :: {{.Namespace}}{{end}}'
    foreground = '#ffffff'
    background = '#316ce4'
    type = 'kubectl'
    style = 'diamond'

  [[blocks.segments]]
    leading_diamond = 'оӮ¶'
    trailing_diamond = '<transparent,background>оӮІ</>'
    template = ' {{ if .WSL }}{{.Icon}}(WSL){{ end }} '
    foreground = '#222222'
    background = '#b2bec3'
    type = 'os'
    style = 'diamond'

    [blocks.segments.properties]
      linux = 'оң’'
      redhat = 'уұ„ӣ'
      arch = 'у°ЈҮ'
      manjaro = 'уұҳҠ'
      ubuntu = 'у°•Ҳ'
      macos = 'оң‘'
      windows = 'оңҸ'

  [[blocks.segments]]
    template = ' {{ if not .Error }}{{ .Icon }}{{ .Percentage }}{{ end }}{{ .Error }}пҠ• '
    foreground = '#262626'
    powerline_symbol = 'оӮІ'
    background = '#f36943'
    type = 'battery'
    style = 'powerline'
    background_templates = ['{{if eq "Charging" .State.String}}#b8e994{{end}}', '{{if eq "Discharging" .State.String}}#fff34e{{end}}', '{{if eq "Full" .State.String}}#33DD2D{{end}}']
    invert_powerline = true

    [blocks.segments.properties]
      charged_icon = 'пүҖ '
      charging_icon = 'пҮҰ '
      discharging_icon = 'оҲҙ '

  [[blocks.segments]]
    leading_diamond = 'оӮІ'
    trailing_diamond = 'оӮҙ'
    template = ' пҒі {{ .CurrentDate | date .Format }} '
    foreground = '#ffffff'
    background = '#0077c2'
    type = 'time'
    style = 'diamond'
    invert_powerline = true

    [blocks.segments.properties]
      time_format = '_2,15:04'

[[blocks]]
  type = 'prompt'
  alignment = 'left'
  newline = true

  [[blocks.segments]]
    template = 'в•°в”Җ'
    foreground = '#0077c2'
    type = 'text'
    style = 'plain'

  [[blocks.segments]]
    template = 'оҠ… '
    foreground = '#e0f8ff'
    type = 'status'
    style = 'plain'
    foreground_templates = ['{{ if gt .Code 0 }}#ef5350{{ end }}']

    [blocks.segments.properties]
      always_enabled = true
