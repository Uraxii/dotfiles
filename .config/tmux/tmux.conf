# tmux config — status bar pinned top with git branch, pwd, battery, date.
# Sourced by tmux on launch (XDG: ~/.config/tmux/tmux.conf).

source-file ~/.config/tmux/tmux.reset.conf

# ----- Terminal -----
set -g  default-terminal      "tmux-256color"
set -ag terminal-overrides    ",*:RGB"              # truecolor passthrough (ghostty)
set -g  focus-events          on
set -g  escape-time           0
set -g  history-limit         1000000
set -g  base-index            1
setw -g pane-base-index       1
set -g  renumber-windows      on
set -g  detach-on-destroy     off
set -g  set-clipboard         on
set -g  mouse                 on
setw -g mode-keys             vi

# ----- Prefix -----
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ----- Status bar (top) — structure -----
# Colors live in ~/.local/share/tmux/theme.conf (generated by sway's set-theme.sh
# from sway/themes/<name>/data/tmux-theme.conf). Defaults below are a safe
# fallback when no theme has been applied yet.
set -g status-position        top
set -g status-interval        5                      # refresh battery/date/branch
set -g status-justify         left

set -g status-left-length     40
set -g status-right-length    200

# Left: session name
set -g status-left            "#[fg=magenta,bold] #S #[fg=brightblack]│ "

# Right: git branch · full pwd · battery · date/time
# Branch: silent if not a repo. Battery: reads /sys, hides if no battery.
set -g status-right "#[fg=green]#(cd '#{pane_current_path}' && git branch --show-current 2>/dev/null | sed 's/^/ /') #[fg=brightblack]│ #[fg=blue]#{pane_current_path} #[fg=brightblack]│ #[fg=yellow]#(bat=$(cat /sys/class/power_supply/BAT*/capacity 2>/dev/null | head -1); [ -n \"$bat\" ] && echo \" $bat%%\") #[fg=brightblack]│ #[fg=cyan]%Y-%m-%d %H:%M "

# Default styles (overridden by theme.conf if present)
set  -g status-style                "fg=white,bg=default"
setw -g window-status-current-style "fg=magenta,bold"
setw -g window-status-style         "fg=white"
setw -g window-status-format        " #I:#W "
setw -g window-status-current-format " #I:#W#{?window_zoomed_flag,(z),} "
set  -g pane-active-border-style    "fg=magenta,bg=default"
set  -g pane-border-style           "fg=brightblack,bg=default"

# ----- Theme overlay -----
# Generated by ~/.config/sway/scripts/set-theme.sh on theme switch. Silent if
# absent (-q) — defaults above remain in effect.
source-file -q ~/.local/share/tmux/theme.conf

# ----- Plugins (optional; require tpm at ~/.tmux/plugins/tpm) -----
# Bootstrap:
#   git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
#   then press <prefix> I inside tmux to install.
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @continuum-restore        'on'
set -g @resurrect-strategy-nvim  'session'

# Initialize tpm — keep at very bottom. No-op if tpm not installed.
if-shell "test -d ~/.tmux/plugins/tpm" "run '~/.tmux/plugins/tpm/tpm'"
