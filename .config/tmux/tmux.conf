# tmux config — 2-line status bar pinned top, manual powerline pills.
# Sourced by tmux on launch (XDG: ~/.config/tmux/tmux.conf).
#
# Architecture:
#   * Pill STRUCTURE (glyphs, segments, layout) defined here using tmux
#     format strings. No external theme plugin — keeps pill bg=default
#     between caps so the terminal background bleeds through (transparent
#     gaps between pills).
#   * Pill COLORS pulled from #{@thm_*} user options set by the active sway
#     theme overlay (sourced near the bottom from ~/.local/share/tmux/theme.conf,
#     produced by sway/scripts/set-theme.sh).
#   * Per-pane #{@venv} user option is set by a zsh precmd hook (.zshrc),
#     pointing at the active Python venv basename; pill empty-collapses when
#     unset.

source-file ~/.config/tmux/tmux.reset.conf

# ----- Terminal -----
set -g  default-terminal      "tmux-256color"
set -ag terminal-overrides    ",*:RGB"              # truecolor passthrough
set -g  focus-events          on
set -g  escape-time           0
set -g  history-limit         1000000
set -g  base-index            1
setw -g pane-base-index       1
set -g  renumber-windows      on
set -g  detach-on-destroy     off
set -g  set-clipboard         on
set -g  mouse                 on
setw -g mode-keys             vi

# ----- Prefix -----
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ----- Palette fallbacks -----
# Safe defaults (catppuccin-mocha) if no sway theme has been applied yet.
# Real values come from the theme overlay sourced below.
set -g @thm_bg      "#1e1e2e"
set -g @thm_bg2     "#313244"
set -g @thm_fg      "#cdd6f4"
set -g @thm_accent  "#cba6f7"
set -g @thm_accent2 "#94e2d5"
set -g @thm_info    "#89b4fa"
set -g @thm_success "#a6e3a1"
set -g @thm_warning "#f9e2af"
set -g @thm_urgent  "#f38ba8"

# ----- Status bar (top, 2 lines) -----
set -g status                 3
set -g status-position        top
set -g status-interval        5
set -g status-justify         left
set -g status-left-length     150
set -g status-right-length    200
set -g status-style           "fg=#{@thm_fg},bg=default"

# ----- Pill design — icon-fill pattern -----
#
#     ICON  text  
#   └─accent──┴─acc─┴─bg2─┴───bg2
#     fg only  fg=bg  gray   fg only
#
# Left rounded cap separator carries accent fg over default bg. Icon slot has
# accent as bg + @thm_bg as fg (dark icon on bright). Body section uses
# @thm_bg2 (dim gray) bg + @thm_fg text. All pill bodies stay uniformly
# muted; each pill's icon header pops in its own accent. Right cap mirrors:
# fg=@thm_bg2 over default bg.
#
# Tokens (      )
# are ASCII placeholders. scripts/glyphs.sh substitutes literal NerdFont
# UTF-8 bytes in place. Keeps the source free of high-codepoint chars that
# some tooling strips on write.
#
# Per-pill scripts (battery.sh, git-branch.sh) emit fully-styled pill bytes
# w/ this same icon-fill structure, so tmux.conf side just calls #(script.sh).

# ----- Line 0 (top): session pill + window list + dir/git/venv/user pills -----

# Left: session pill — accent-colored user icon header, gray body w/ #S.
set -g status-left "#[fg=#{@thm_accent},bg=default]#[bg=#{@thm_accent},fg=#{@thm_bg},bold]  #[bg=#{@thm_bg2},fg=#{@thm_fg},nobold] #S #[fg=#{@thm_bg2},bg=default] #[fg=#{@thm_accent2},bg=default]#[bg=#{@thm_accent2},fg=#{@thm_bg}]  #[bg=#{@thm_bg2},fg=#{@thm_fg}] #(whoami) #[fg=#{@thm_bg2},bg=default] #[fg=#{@thm_warning},bg=default]#[bg=#{@thm_warning},fg=#{@thm_bg}]  #[bg=#{@thm_bg2},fg=#{@thm_fg}] #H #[fg=#{@thm_bg2},bg=default]"

# Right pills (top): directory · git · venv · user · host.
# git pill omitted outside repos; venv pill omitted when #{@venv} unset.
set -g status-right "#[fg=#{@thm_info},bg=default]#[bg=#{@thm_info},fg=#{@thm_bg}]  #[bg=#{@thm_bg2},fg=#{@thm_fg}] #(~/.config/tmux/scripts/pwd-display.sh '#{pane_current_path}') #[fg=#{@thm_bg2},bg=default] #(~/.config/tmux/scripts/battery.sh) #[fg=#{@thm_accent2},bg=default]#[bg=#{@thm_accent2},fg=#{@thm_bg}]  #[bg=#{@thm_bg2},fg=#{@thm_fg}] %H:%M #[fg=#{@thm_bg2},bg=default]"

# Window pills (in window list, center of L0). Same icon-fill pattern; inactive
# windows use bg2 throughout, current window uses accent header.
setw -g window-status-format         ""
setw -g window-status-current-format ""
setw -g window-status-separator      " "
setw -g window-status-style          "fg=#{@thm_fg},bg=default,none"

# ----- Line 1 (bottom): empty left, battery + clock right -----
#
# Battery pill is fully emitted by battery.sh (own caps, accent header tier
# by %, dynamic charging/discharging glyph in header, % in gray body). Clock
# pill uses fixed accent2 color w/ inline icon-fill structure.
set -g status-format[0] "#[align=left]#{T:status-left}#[align=right]#{T:status-right}"
set -g status-format[1] "#[align=right,fg=#{@thm_fg},bg=default]#(~/.config/tmux/scripts/git-branch.sh '#{pane_current_path}')#{?#{@venv},#[fg=#{@thm_urgent}#,bg=default]#[bg=#{@thm_urgent}#,fg=#{@thm_bg}]  #[bg=#{@thm_bg2}#,fg=#{@thm_fg}] #{@venv} #[fg=#{@thm_bg2}#,bg=default],}"
set -g status-format[2] " "

# Borders, mode, message
set -g pane-active-border-style "fg=#{@thm_accent},bg=default"
set -g pane-border-style        "fg=#{@thm_bg2},bg=default"
set -g message-style            "fg=#{@thm_bg},bg=#{@thm_accent}"
set -g mode-style               "fg=#{@thm_bg},bg=#{@thm_warning}"

# ----- fzf integrations -----
set -g @fzf-url-fzf-options '-p 60%,30% --prompt="   " --border-label=" Open URL "'
set -g @fzf-url-history-limit '2000'

# ----- Theme overlay -----
# Generated by ~/.config/sway/scripts/set-theme.sh on theme switch. Overrides
# @thm_* user options (see palette fallbacks above). Silent if absent (-q).
source-file -q ~/.local/share/tmux/theme.conf

# ----- Plugins -----
# Auto-bootstrap: clone tpm + install declared plugins on first run.
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'fcsonline/tmux-thumbs'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'wfxr/tmux-fzf-url'
set -g @plugin 'omerxx/tmux-sessionx'
set -g @plugin 'omerxx/tmux-floax'

# resurrect / continuum — auto save/restore sessions
set -g @continuum-restore        'on'
set -g @resurrect-strategy-nvim  'session'

# sessionx (prefix + o) — fuzzy session switcher
set -g @sessionx-bind                            'o'
set -g @sessionx-bind-zo-new-window              'ctrl-y'
set -g @sessionx-auto-accept                     'off'
set -g @sessionx-x-path                          '~/dotfiles'
set -g @sessionx-window-height                   '85%'
set -g @sessionx-window-width                    '75%'
set -g @sessionx-zoxide-mode                     'on'
set -g @sessionx-custom-paths-subdirectories     'false'
set -g @sessionx-filter-current                  'false'

# floax (prefix + p) — floating scratch pane
set -g @floax-bind         'p'
set -g @floax-width        '80%'
set -g @floax-height       '80%'
set -g @floax-border-color 'magenta'
set -g @floax-text-color   'blue'
set -g @floax-change-path  'true'

# Initialize tpm — keep at very bottom.
run '~/.tmux/plugins/tpm/tpm'
