# tmux theme overlay — manjaro palette.
# Sourced by tmux from ~/.local/share/tmux/theme.conf (copied by set-theme.sh).
# Palette ref: themes/manjaro/data/waybar-colors.css
#   bg=#0d0b1a bg2=#1a1530 fg=#e8e0f0 accent=#e6207a
#   info=#5cc8d8 success=#2eb398 warning=#f0c040
#   accent1=#a96cef accent2=#ff1493 urgent=#ff1493

# Status bar
set -g status-style "fg=#e8e0f0,bg=#0d0b1a"

# Left: session
set -g status-left "#[fg=#e6207a,bold] #S #[fg=#1a1530]│ "

# Right: branch · pwd · battery · date
set -g status-right "#[fg=#2eb398]#(cd '#{pane_current_path}' && git branch --show-current 2>/dev/null | sed 's/^/ /') #[fg=#1a1530]│ #[fg=#5cc8d8]#{pane_current_path} #[fg=#1a1530]│ #[fg=#f0c040]#(bat=$(cat /sys/class/power_supply/BAT*/capacity 2>/dev/null | head -1); [ -n \"$bat\" ] && echo \" $bat%%\") #[fg=#1a1530]│ #[fg=#a96cef]%Y-%m-%d %H:%M "

# Window list
setw -g window-status-current-style "fg=#e6207a,bold"
setw -g window-status-style         "fg=#e8e0f0"

# Pane borders
set -g pane-active-border-style "fg=#e6207a,bg=default"
set -g pane-border-style        "fg=#1a1530,bg=default"

# Message / command prompt
set -g message-style "fg=#0d0b1a,bg=#e6207a"
set -g mode-style    "fg=#0d0b1a,bg=#f0c040"
