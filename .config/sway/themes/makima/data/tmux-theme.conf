# tmux theme overlay — makima palette (catppuccin-frappe hex).
# Sourced by tmux from ~/.local/share/tmux/theme.conf (copied by set-theme.sh).
#
# Sets @thm_* user options read by tmux.conf pill format strings. Hot-reloaded
# on sway theme switch (set-theme.sh issues `tmux source-file` + refresh).

set -g @thm_bg      "#303446"
set -g @thm_bg2     "#414559"
set -g @thm_fg      "#c6d0f5"
set -g @thm_accent  "#ca9ee6"
set -g @thm_accent2 "#81c8be"
set -g @thm_info    "#8caaee"
set -g @thm_success "#a6d189"
set -g @thm_warning "#e5c890"
set -g @thm_urgent  "#e78284"
