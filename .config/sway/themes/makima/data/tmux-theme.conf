# tmux theme overlay — makima palette.
# Sourced by tmux from ~/.local/share/tmux/theme.conf (copied by set-theme.sh).
# Palette ref: themes/makima/data/waybar-colors.css
#   bg=#282828 bg2=#504945 fg=#f0e8d0 accent=#d79921
#   info=#83a598 success=#b8bb26 warning=#fabd2f
#   accent1=#d3869b accent2=#8ec07c urgent=#cc241d

# Status bar
set -g status-style "fg=#f0e8d0,bg=#282828"

# Left: session
set -g status-left "#[fg=#d79921,bold] #S #[fg=#504945]│ "

# Right: branch · pwd · battery · date
set -g status-right "#[fg=#b8bb26]#(cd '#{pane_current_path}' && git branch --show-current 2>/dev/null | sed 's/^/ /') #[fg=#504945]│ #[fg=#83a598]#{pane_current_path} #[fg=#504945]│ #[fg=#fabd2f]#(bat=$(cat /sys/class/power_supply/BAT*/capacity 2>/dev/null | head -1); [ -n \"$bat\" ] && echo \" $bat%%\") #[fg=#504945]│ #[fg=#8ec07c]%Y-%m-%d %H:%M "

# Window list
setw -g window-status-current-style "fg=#d79921,bold"
setw -g window-status-style         "fg=#f0e8d0"

# Pane borders
set -g pane-active-border-style "fg=#d79921,bg=default"
set -g pane-border-style        "fg=#504945,bg=default"

# Message / command prompt
set -g message-style "fg=#282828,bg=#d79921"
set -g mode-style    "fg=#282828,bg=#fabd2f"
