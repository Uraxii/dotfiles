# ~/dotfiles/kitty/kitty.conf  ->  ~/.config/kitty/kitty.conf (stow, target ~/.config)
#
# Starter config. NOTE: kitty is not yet wired into the set-theme.sh theming
# pipeline, so colors here are static. To theme it with the rest of the desktop,
# add a themes/<name>/data/kitty-colors.conf + an `include` line below and a
# set-theme.sh copy step (see CLAUDE.md "Theming System").

# --- Color theme ---
# SynthWave '84 (python variant, from kitty-themes). Kept as a tracked file so
# it is stow-managed. Swap this line to change theme, or template it later.
include synthwave84.conf

# --- Font (mirrors sway/prefs $font_family) ---
font_family      0xProto Nerd Font
font_size        14.0

# --- Shell: inherit login shell (xonsh). Leave unset to use it. ---
# shell            .

# --- Window ---
remember_window_size   yes
window_padding_width   8
confirm_os_window_close 1
enabled_layouts        tall, stack, grid

# --- Scrollback ---
scrollback_lines       10000

# --- Bell ---
enable_audio_bell      no
visual_bell_duration   0.05

# --- Tabs ---
tab_bar_edge           bottom
tab_bar_style          powerline
tab_powerline_style    slanted

# --- Keybindings (KDE-friendly) ---
map ctrl+shift+t       new_tab
map ctrl+shift+w       close_tab
map ctrl+shift+enter   new_window
map ctrl+shift+equal   change_font_size all +1.0
map ctrl+shift+minus   change_font_size all -1.0
map ctrl+shift+0       change_font_size all 0
