# deps.toml — package manifest for install.py.
#
# Schema (option D, finalised):
#   - Section header   = logical pkg id. Used by [groups] + script lookup.
#   - pkg              = install name (default across distros).
#   - description      = MANDATORY; one-line purpose.
#   - enabled          = bool; default true. Set false to skip without deleting.
#   - version          = optional pin (operator syntax). Omitted = latest;
#                        installed-if-absent; no upgrade chase.
#   - source           = native (default) | aur | nix-unstable | cargo | uv-tool
#                        | pip | npm | script | manual | skip | unsupported
#                        `script` = run install_cmd via bash -c (upstream
#                        curl|bash installers). Requires install_cmd field;
#                        presence detected via `bin` PATH probe only.
#                        Prefer `uv-tool` over `pip` for python CLIs on systems
#                        with PEP 668 externally-managed-environment (Arch,
#                        Fedora ≥39, Debian ≥12). uv-tool puts each tool in its
#                        own isolated venv and exposes the binary on PATH.
#                        `unsupported` = platform doesn't ship this pkg (e.g.
#                        Wayland tooling on termux/Android). Distinct from
#                        `skip` (user-deferred) in the install report. Pair
#                        with `reason = "..."` so logs explain the gap.
#   - reason           = optional one-line explanation. Surfaced in the install
#                        report when source = "unsupported". Per-distro override
#                        encouraged so the message names the platform-specific
#                        cause (e.g. "no wayland on android").
#   - sudo             = optional bool. Informational only — does install
#                        require root? Defaults derived from source+distro:
#                          native arch/ubuntu/fedora → true
#                          native termux             → false (single-user)
#                          aur                       → true
#                          nix/cargo/npm/uv-tool/pip → false (user dirs)
#                          script                    → false (author wraps
#                                                     sudo inside install_cmd)
#                        Override per-distro when default is wrong. Surfaced
#                        in `--show`, per-pkg log line, and `--list-sudo`.
#   - install_cmd      = REQUIRED when source = "script". Shell command run
#                        via `bash -c`. Pipelines allowed. Idempotency is the
#                        installer's responsibility — bin probe protects
#                        against re-runs when the binary is already on PATH.
#   - bin              = optional binary name (string) OR list of names. If the
#                        pkg-manager presence check returns absent but any
#                        declared binary is on $PATH, the pkg is treated as
#                        externally installed (skipped). Lets manually-installed
#                        tools survive the idempotency check.
#   - post_install     = optional idempotent shell snippet (run only if install fired).
#   - <distro>.<field> = per-distro override (only fields that deviate).
#
# Version operators: "3.13", "=3.13", ">=3.13", "<4", "~=3.13", ">=3.13,<3.14".
#
# Profiles (optional, opt-in via `--profile <name>`):
#   [profiles.<name>]
#     exclude_groups = ["desktop", "fonts"]   # group ids — all members dropped
#     exclude        = ["ghostty"]            # individual pkg ids
#   Use case: server install on ubuntu — drop wayland/sway/fonts stack without
#   touching `enabled` per pkg. `--only` overrides profile (explicit pick wins).
#   `install.py --list-profiles` to enumerate.

version = 1
supported_distros = ["arch", "nixos", "ubuntu", "fedora", "termux"]
# Termux notes:
#   - Native pkg mgr = `pkg` (apt wrapper). No sudo (single-user Android).
#   - Wayland/GUI desktop ecosystem unavailable → all sway/waybar/wofi/swaylock
#     entries set termux.source = "skip".
#   - No gcc on termux — Mason/native-builds use clang (gcc entry remaps).
#   - claude-code is npm-only on termux (no AUR, no nix-unstable, no rpm).
#   - Nerd font: manual install to ~/.termux/font.ttf then `termux-reload-settings`.

[defaults]
source  = "native"
enabled = true

# Default login shell. Script (post-install) ensures the chosen shell's binary
# is registered in /etc/shells (sudo) and switches the current user via chsh.
# Skipped if already current shell, or if the binary isn't found on PATH after
# install. `id` refers to a section header below (e.g. "zsh", "xonsh", "bash").
# Comment the whole [shell] block to disable the post-install shell switch.
[shell]
default = "xonsh"

# ============================================================
# Wayland / Sway ecosystem
# ============================================================

[sway]
pkg = "sway"
bin = "sway"
description = "Wayland tiling window manager."
termux.source = "unsupported"
termux.reason = "no wayland on android"

[swayidle]
pkg = "swayidle"
bin = "swayidle"
description = "Sway idle inhibitor and screen-lock trigger."
termux.source = "unsupported"
termux.reason = "no wayland on android"

[swaybg]
pkg = "swaybg"
bin = "swaybg"
description = "Sway wallpaper daemon."
termux.source = "unsupported"
termux.reason = "no wayland on android"

[swaylock-effects]
pkg = "swaylock-effects"
bin = "swaylock"
description = "Sway screen locker with blur and clock effects."
arch.source = "aur"
# Ubuntu/Fedora: source build (meson + scdoc + pam-dev + many wlroots headers).
# Too heavy + version-fragile to script reliably here. Manual install or fall
# back to stock `swaylock` apt/dnf pkg (loses blur+clock effects). Server
# profile excludes this anyway.
ubuntu.source = "manual"
ubuntu.url = "https://github.com/jirutka/swaylock-effects"
fedora.source = "manual"
fedora.url = "https://github.com/jirutka/swaylock-effects"
termux.source = "unsupported"
termux.reason = "no wayland on android"

# ============================================================
# Status bar & launcher
# ============================================================

[waybar]
pkg = "waybar"
bin = "waybar"
description = "Status bar for Wayland compositors."
termux.source = "unsupported"
termux.reason = "no wayland on android"

[wofi]
pkg = "wofi"
bin = "wofi"
description = "Application launcher for Wayland (rofi-style)."
termux.source = "unsupported"
termux.reason = "no wayland on android"

[networkmanager-dmenu]
pkg = "networkmanager-dmenu"
bin = "networkmanager_dmenu"
description = "dmenu/wofi front-end for NetworkManager."
arch.source = "aur"
# Ubuntu/Fedora: single python script in the upstream repo. Clone, install to
# /usr/local/bin (sudo), drop temp clone. bin probe in install.py skips re-run
# when /usr/local/bin/networkmanager_dmenu already exists.
ubuntu.source = "script"
ubuntu.install_cmd = "tmp=$(mktemp -d) && git clone --depth 1 https://github.com/firecat53/networkmanager-dmenu \"$tmp\" && sudo install -m 755 \"$tmp/networkmanager_dmenu\" /usr/local/bin/networkmanager_dmenu && rm -rf \"$tmp\""
ubuntu.sudo = true
fedora.source = "script"
fedora.install_cmd = "tmp=$(mktemp -d) && git clone --depth 1 https://github.com/firecat53/networkmanager-dmenu \"$tmp\" && sudo install -m 755 \"$tmp/networkmanager_dmenu\" /usr/local/bin/networkmanager_dmenu && rm -rf \"$tmp\""
fedora.sudo = true
termux.source = "unsupported"
termux.reason = "no NetworkManager on android (use Android settings)"

[pavucontrol]
pkg = "pavucontrol"
bin = "pavucontrol"
description = "PulseAudio volume control GUI."
termux.source = "unsupported"
termux.reason = "no pulseaudio GUI on android (termux uses termux-api audio)"

# ============================================================
# Applications
# ============================================================

[ghostty]
pkg = "ghostty"
bin = "ghostty"
description = "GPU-accelerated terminal emulator."
arch.source = "aur"
# Ubuntu/Fedora: no upstream prebuilt binary. Source build requires zig 0.13+
# and is brittle across distro versions. Leaving manual; desktop users follow
# https://ghostty.org/download (often via flatpak / 3rd-party PPA). Server
# profile excludes ghostty so this never fires on headless installs.
ubuntu.source = "manual"
ubuntu.url = "https://ghostty.org/download"
fedora.source = "manual"
fedora.url = "https://ghostty.org/download"
termux.source = "unsupported"
termux.reason = "GPU terminal needs X/Wayland (use Termux app itself as terminal)"

[tmux]
pkg = "tmux"
bin = "tmux"
description = "Terminal multiplexer (config: .config/tmux/tmux.conf)."

[neovim]
pkg = "neovim"
bin = "nvim"
description = "Modal text editor (Kickstart-based config)."
version = ">=0.10"
ubuntu.version = ">=0.9"

[gcc]
pkg = "gcc"
bin = "gcc"
description = "C compiler. Required by treesitter and native LSPs."
# Termux dropped gcc years ago; ships clang only. clang provides `cc` wrapper
# which treesitter and Mason native builds invoke. Bin remap so the external-
# install detection accepts a clang-only environment.
termux.pkg = "clang"
termux.bin = ["clang", "cc"]

[gnumake]
pkg = "make"
bin = "make"
description = "Build tool. Required by plugin builds (telescope-fzf-native, etc)."
nixos.pkg = "gnumake"

[unzip]
pkg = "unzip"
bin = "unzip"
description = "Zip extractor. Required for Mason package extraction."

[ripgrep]
pkg = "ripgrep"
bin = "rg"
description = "Fast recursive grep. Used by telescope live_grep."

[fd]
pkg = "fd"
bin = ["fd", "fdfind"]
description = "Fast find alternative. Used by telescope find_files."
ubuntu.pkg = "fd-find"
fedora.pkg = "fd-find"

[fzf]
pkg = "fzf"
bin = "fzf"
description = "Fuzzy finder. Required by tmux-sessionx and tmux-fzf-url."

[bat]
pkg = "bat"
bin = ["bat", "batcat"]
description = "Syntax-highlighted file/command preview. Used by tmux-sessionx preview window."
# Ubuntu ships bat as batcat (Debian packaging conflict w/ bacula). Create
# /usr/local/bin/bat -> batcat symlink post-install so tools calling `bat`
# (tmux-sessionx, etc.) find it without config overrides.
ubuntu.post_install = "if [ ! -x /usr/local/bin/bat ]; then sudo ln -sf /usr/bin/batcat /usr/local/bin/bat; fi"

[wl-clipboard]
pkg = "wl-clipboard"
bin = ["wl-copy", "wl-paste"]
description = "Wayland clipboard CLI (wl-copy / wl-paste). Used by nvim and tmux-yank."
# Termux: use `termux-clipboard-get` / `termux-clipboard-set` from termux-api
# package instead. Nvim/tmux integrations need a wrapper script — out of scope
# for this manifest.
termux.source = "unsupported"
termux.reason = "no wayland on android (use termux-api: termux-clipboard-set/get)"

[nodejs]
pkg = "nodejs"
# bin = "npm" (not "node") on purpose. install.py treats ANY declared bin on
# PATH as "externally installed" and skips reinstall. If we listed `node`, a
# stale `/usr/bin/node` left by a prior `apt install nodejs` (which does NOT
# ship npm on older ubuntu) would suppress the NodeSource reinstall, leaving
# npm missing for downstream npm-source pkgs (claude-code, opencode, pi).
# NodeSource's nodejs pkg bundles both — probing for npm implies node too.
bin = "npm"
description = "JavaScript runtime. Required by Mason-installed JS/TS LSPs (tsserver, vtsls)."
version = ">=22"
nixos.pkg = "nodejs_22"
# Ubuntu apt nodejs is stale (v18 on 24.04) AND does not bundle npm — opencode/pi
# downstream then fail with "npm not in PATH". NodeSource setup script adds the
# nodesource apt repo + installs current major; package bundles npm.
ubuntu.source = "script"
ubuntu.install_cmd = "curl -fsSL https://deb.nodesource.com/setup_22.x | sudo -E bash - && sudo apt-get install -y nodejs"
# NodeSource setup script + apt-get both need root.
ubuntu.sudo = true
fedora.pkg = "nodejs"
# Termux ships current node in `nodejs`; `nodejs-lts` is also available if a
# pinned LTS is needed. Default to rolling.
termux.pkg = "nodejs"

# ============================================================
# Note-taking / Knowledge Base
# ============================================================

[obsidian]
pkg = "obsidian"
bin = "obsidian"
description = "Powerful knowledge base that works on top of a local folder of plain text Markdown files"
# Arch: in `extra` repo (not AUR). Default `native` source handles it.
nixos.source = "nix-unstable"
# Ubuntu/Fedora: no native pkg; AppImage or flatpak from obsidian.md/download
ubuntu.source = "manual"
ubuntu.url = "https://obsidian.md/download (flatpak: flatpak install flathub md.obsidian.Obsidian)"
fedora.source = "manual"
fedora.url = "https://obsidian.md/download (flatpak: flatpak install flathub md.obsidian.Obsidian)"
termux.source = "unsupported"
termux.reason = "no GUI on android"

[notesmd-cli]
pkg = "notesmd-cli-bin"
bin = "notesmd-cli"
description = "Obsidian CLI - search, create, update, move notes in an Obsidian vault from the terminal (github.com/Yakitrak/notesmd-cli)"
arch.source = "aur"
# Non-Arch distros: download prebuilt Go binary from GitHub releases.
# Single static binary extracted to ~/.local/bin; no runtime deps.
ubuntu.source = "script"
ubuntu.install_cmd = "if [ -x \"$HOME/.local/bin/notesmd-cli\" ]; then echo 'already installed'; else mkdir -p \"$HOME/.local/bin\" && curl -fLo /tmp/notesmd-cli.tar.gz https://github.com/Yakitrak/notesmd-cli/releases/latest/download/notesmd-cli_0.3.6_linux_amd64.tar.gz && tar xzf /tmp/notesmd-cli.tar.gz -C \"$HOME/.local/bin\" notesmd-cli && chmod +x \"$HOME/.local/bin/notesmd-cli\" && rm /tmp/notesmd-cli.tar.gz; fi"
fedora.source = "script"
fedora.install_cmd = "if [ -x \"$HOME/.local/bin/notesmd-cli\" ]; then echo 'already installed'; else mkdir -p \"$HOME/.local/bin\" && curl -fLo /tmp/notesmd-cli.tar.gz https://github.com/Yakitrak/notesmd-cli/releases/latest/download/notesmd-cli_0.3.6_linux_amd64.tar.gz && tar xzf /tmp/notesmd-cli.tar.gz -C \"$HOME/.local/bin\" notesmd-cli && chmod +x \"$HOME/.local/bin/notesmd-cli\" && rm /tmp/notesmd-cli.tar.gz; fi"
nixos.source = "script"
nixos.install_cmd = "if [ -x \"$HOME/.local/bin/notesmd-cli\" ]; then echo 'already installed'; else mkdir -p \"$HOME/.local/bin\" && curl -fLo /tmp/notesmd-cli.tar.gz https://github.com/Yakitrak/notesmd-cli/releases/latest/download/notesmd-cli_0.3.6_linux_amd64.tar.gz && tar xzf /tmp/notesmd-cli.tar.gz -C \"$HOME/.local/bin\" notesmd-cli && chmod +x \"$HOME/.local/bin/notesmd-cli\" && rm /tmp/notesmd-cli.tar.gz; fi"
# Termux (arm64): same approach with arm64 binary
termux.source = "script"
termux.install_cmd = "if [ -x \"$HOME/.local/bin/notesmd-cli\" ]; then echo 'already installed'; else mkdir -p \"$HOME/.local/bin\" && curl -fLo /tmp/notesmd-cli.tar.gz https://github.com/Yakitrak/notesmd-cli/releases/latest/download/notesmd-cli_0.3.6_linux_arm64.tar.gz && tar xzf /tmp/notesmd-cli.tar.gz -C \"$HOME/.local/bin\" notesmd-cli && chmod +x \"$HOME/.local/bin/notesmd-cli\" && rm /tmp/notesmd-cli.tar.gz; fi"

# ============================================================
# Fonts
# ============================================================

[nerd-fonts-0xproto]
pkg = "ttf-0xproto-nerd"
description = "0xProto patched Nerd Font. Used by ghostty, waybar, wofi."
post_install = "fc-cache -f"
arch.source = "aur"
nixos.pkg = "nerd-fonts._0xproto"
# Ubuntu/Fedora: download zip from upstream release → ~/.local/share/fonts.
# Idempotency: skip download if a 0xProtoNerdFont*.ttf already present.
# Per-user install (no sudo). post_install runs fc-cache to refresh font cache.
ubuntu.source = "script"
ubuntu.install_cmd = "if ls ~/.local/share/fonts/0xProto/*.ttf >/dev/null 2>&1; then echo 'already installed'; else mkdir -p ~/.local/share/fonts/0xProto && curl -fLo /tmp/0xProto.zip https://github.com/ryanoasis/nerd-fonts/releases/latest/download/0xProto.zip && unzip -o /tmp/0xProto.zip -d ~/.local/share/fonts/0xProto && rm /tmp/0xProto.zip; fi"
fedora.source = "script"
fedora.install_cmd = "if ls ~/.local/share/fonts/0xProto/*.ttf >/dev/null 2>&1; then echo 'already installed'; else mkdir -p ~/.local/share/fonts/0xProto && curl -fLo /tmp/0xProto.zip https://github.com/ryanoasis/nerd-fonts/releases/latest/download/0xProto.zip && unzip -o /tmp/0xProto.zip -d ~/.local/share/fonts/0xProto && rm /tmp/0xProto.zip; fi"
# Termux: drop the ttf at ~/.termux/font.ttf then `termux-reload-settings`.
# fontconfig isn't the loader on Android — fc-cache is a no-op for the
# Termux app's terminal renderer.
termux.source = "manual"
termux.url = "https://github.com/ryanoasis/nerd-fonts/releases (save as ~/.termux/font.ttf, then termux-reload-settings)"

# ============================================================
# Shell utilities (prompt, history, plugins — not the shells themselves;
# shells live in their own section after [uv] so uv-tool installs resolve).
# ============================================================

[starship]
pkg = "starship"
bin = "starship"
description = "Cross-shell prompt (config: .config/starship.toml.tmpl via set-theme.sh)."
# Ubuntu/Fedora apt|dnf ship outdated starship; cargo path needs rustup.
# Upstream install.sh handles arch detection + sudo + /usr/local/bin install.
ubuntu.source = "script"
ubuntu.install_cmd = "curl -sS https://starship.rs/install.sh | sh -s -- -y"
# install.sh elevates via sudo internally for /usr/local/bin write.
ubuntu.sudo = true
fedora.source = "script"
fedora.install_cmd = "curl -sS https://starship.rs/install.sh | sh -s -- -y"
fedora.sudo = true

[zoxide]
pkg = "zoxide"
bin = "zoxide"
description = "Smart cd that learns frequent dirs. Used by .zshrc."

[glow]
pkg = "glow"
bin = "glow"
description = "Terminal markdown renderer (charm.sh). Pretty-print .md in shell + browse local file trees."
url = "https://github.com/charmbracelet/glow"
# Arch/Fedora/NixOS/Termux ship glow natively. Ubuntu lacks it in default repos —
# fall back to upstream GitHub release tarball.
ubuntu.source = "script"
# Asset name embeds version (glow_<ver>_Linux_x86_64.tar.gz) — resolve via API.
ubuntu.install_cmd = "url=$(curl -fsSL https://api.github.com/repos/charmbracelet/glow/releases/latest | grep browser_download_url | grep Linux_x86_64.tar.gz | grep -v sbom | head -1 | cut -d'\"' -f4) && curl -fsSL \"$url\" | tar xz -C /tmp glow && sudo install -m755 /tmp/glow /usr/local/bin/glow && rm -f /tmp/glow"
ubuntu.sudo = true

[tealdeer]
pkg = "tealdeer"
bin = "tldr"
description = "Fast tldr client (Rust). Offline man-page-style summaries."
post_install = "tldr --update"
# Ubuntu ships tealdeer in universe (22.04+). Fedora ships in default repos.
# Falls back to native apt/dnf — no rustup required.

[stow]
pkg = "stow"
bin = "stow"
description = "GNU Stow. Symlinks dotfiles into $HOME from this repo."

[git]
pkg = "git"
bin = "git"
description = "Base VCS. Required by lazy.nvim and tpm clone."

[gh]
pkg = "gh"
bin = "gh"
description = "GitHub CLI. PR / issue / repo operations."
arch.pkg = "github-cli"

[claude-code]
pkg = "claude-code"
bin = "claude"
description = "Anthropic Claude Code CLI. Ships ~weekly; track upstream cadence."
arch.source = "aur"
arch.pkg = "claude-code-bin"
nixos.source = "nix-unstable"
# Ubuntu/Fedora: official npm package (same as termux). Requires nodejs declared
# earlier; install.py's declaration-order processing guarantees nodejs runs first.
ubuntu.source = "npm"
ubuntu.pkg = "@anthropic-ai/claude-code"
fedora.source = "npm"
fedora.pkg = "@anthropic-ai/claude-code"
# Termux: no AUR, no nix-unstable, no rpm. npm is the only sane upstream.
termux.source = "npm"
termux.pkg = "@anthropic-ai/claude-code"

[opencode]
pkg = "opencode-ai"
bin = "opencode"
description = "Opencode AI coding agent CLI (config: .config/opencode/)."
source = "npm"

[pi]
pkg = "@earendil-works/pi-coding-agent"
bin = "pi"
description = "Pi terminal coding harness (pi.dev). Minimal agent shell."
source = "npm"

[hermes]
pkg = "hermes"
bin = "hermes"
description = "Nous Research Hermes agent CLI (nousresearch.com)."
source = "script"
install_cmd = "curl -fsSL https://hermes-agent.nousresearch.com/install.sh | bash"
post_install = "hermes setup"
url = "https://hermes-agent.nousresearch.com/"

[graphify]
pkg = "graphifyy"
bin = "graphify"
description = "Multi-modal knowledge-graph builder for AI coding assistants (Tree-sitter AST + LLM extraction + NetworkX + Leiden clustering)."
url = "https://graphify.net"
# PyPI package name is `graphifyy` (double-y); CLI binary is `graphify`.
# uv-tool isolates the venv from system python (PEP 668-safe across arch/fedora/ubuntu/debian).
# Requires Python 3.10+. Companion SKILL.md vendored at .claude/skills/graphify/.
source = "uv-tool"
# Termux: ships Python but lacks build deps for some graphify extras (faster-whisper, leiden);
# core build works. Leave at default uv-tool; user installs extras manually if needed.

# ============================================================
# Bootstrap toolchain — must precede pkgs that use `source = "uv-tool"`.
# ============================================================

[uv]
pkg = "uv"
bin = "uv"
description = "Python package runner. Drives `uv run --script`, `uvx weasyprint`, and uv-tool installs."
# Ubuntu/Fedora: astral install.sh drops static binary at ~/.local/bin/uv —
# no rustup, no system python build deps. Idempotent (no-ops if uv on PATH).
ubuntu.source = "script"
ubuntu.install_cmd = "curl -LsSf https://astral.sh/uv/install.sh | sh"
fedora.source = "script"
fedora.install_cmd = "curl -LsSf https://astral.sh/uv/install.sh | sh"

# ============================================================
# Shells (login + interactive — xonsh uses uv-tool, requires [uv] above)
# ============================================================

[zsh]
pkg = "zsh"
bin = "zsh"
description = "Z shell. Login shell for this user."

[xonsh]
pkg = "xonsh[full]"
bin = "xonsh"
description = "Python-powered shell. Python syntax + shell operators in one prompt (xon.sh)."
# uv-tool gives isolated venv per CLI; sidesteps PEP 668 + cryptography wheel
# build issues that broke `source = "pip"` on minimal ubuntu server.
source = "uv-tool"
# NixOS: install natively. A login shell + xontrib ecosystem don't belong in a
# uv-tool venv (would isolate from system python and force `uv tool install
# --with xontrib-*` rebuilds). nixpkgs `xonsh` is the full distribution.
nixos.source = "native"
nixos.pkg = "xonsh"

# ============================================================
# Utilities
# ============================================================

[jq]
pkg = "jq"
bin = "jq"
description = "JSON parser CLI. Used by pipeline scripts and setup.sh."

# ============================================================
# Pipeline runtime (uv + python + weasyprint system libs)
# ============================================================

[python]
pkg = "python3.13"
bin = ["python3.13", "python3"]
description = "Python interpreter. Required by pipeline_ask, hooks, and inline-script tools."
version = ">=3.11"
arch.pkg = "python"
nixos.pkg = "python313"
# Termux ships a single `python` package (rolling 3.x, currently 3.12).
# No per-minor variants. bin probe via `python` covers both python/python3.
termux.pkg = "python"
termux.bin = ["python", "python3"]

[pango]
pkg = "pango"
description = "Text layout library. weasyprint runtime dep for HTML→PDF rendering."
ubuntu.pkg = "libpango-1.0-0"

[cairo]
pkg = "cairo"
description = "2D graphics library. weasyprint runtime dep for HTML→PDF rendering."
ubuntu.pkg = "libcairo2"

[gdk-pixbuf]
pkg = "gdk-pixbuf2"
description = "Image loading library. weasyprint runtime dep for HTML→PDF rendering."
ubuntu.pkg = "libgdk-pixbuf-2.0-0"
nixos.pkg = "gdk-pixbuf"

[libffi]
pkg = "libffi"
description = "Foreign function interface library. weasyprint / cffi runtime dep."
ubuntu.pkg = "libffi8"

# ============================================================
# Containers
# ============================================================

[docker]
pkg = "docker"
bin = "docker"
description = "Container runtime + CLI (docker-ce w/ buildx + compose plugin on ubuntu/fedora)."
# Add current user to docker group + start service. Fires only after a real
# install (manual/unsupported short-circuit before post_install). systemctl
# may no-op on non-systemd hosts — best-effort, errors are warnings only.
post_install = "sudo usermod -aG docker \"$USER\" && sudo systemctl enable --now docker.service && echo 'log out + back in for docker group to take effect'"
# Ubuntu/Fedora: upstream convenience script. Sets up apt|dnf repo, installs
# docker-ce + buildx + compose plugin, enables + starts the service. The
# script self-elevates via sudo internally.
ubuntu.source = "script"
ubuntu.install_cmd = "curl -fsSL https://get.docker.com | sudo sh"
ubuntu.sudo = true
fedora.source = "script"
fedora.install_cmd = "curl -fsSL https://get.docker.com | sudo sh"
fedora.sudo = true
# NixOS: imperative install would bypass declarative config + violate FHS
# expectations. Enable via configuration.nix and rebuild.
nixos.source = "manual"
nixos.url = "https://nixos.wiki/wiki/Docker (set virtualisation.docker.enable = true; nixos-rebuild switch)"
# No kernel namespace/cgroup support on stock Android.
termux.source = "unsupported"
termux.reason = "no kernel container support on android"

# ============================================================
# Games
# ============================================================

[godots]
pkg = "godots"
bin = "godots"
description = "Godot version manager + launcher (multiple engine installs in one place)."
# Arch: AUR prebuilt. Ubuntu/Fedora: upstream ships LinuxX11.zip on GitHub
# releases containing single binary `Godots.x86_64`. Script unpacks to
# ~/.local/share/godots/ and drops symlink at ~/.local/bin/godots (no sudo).
# NixOS: stays manual — generic linux binary needs nix-ld or FHS env to run;
# defer to user's wrapper preference.
arch.source = "aur"
arch.pkg = "godots-bin"
ubuntu.source = "script"
ubuntu.install_cmd = "if [ -x \"$HOME/.local/bin/godots\" ]; then echo 'already installed'; else mkdir -p \"$HOME/.local/share/godots\" \"$HOME/.local/bin\" && curl -fLo /tmp/godots.zip https://github.com/MakovWait/godots/releases/latest/download/LinuxX11.zip && unzip -o /tmp/godots.zip -d \"$HOME/.local/share/godots\" && chmod +x \"$HOME/.local/share/godots/Godots.x86_64\" && ln -sf \"$HOME/.local/share/godots/Godots.x86_64\" \"$HOME/.local/bin/godots\" && rm /tmp/godots.zip; fi"
fedora.source = "script"
fedora.install_cmd = "if [ -x \"$HOME/.local/bin/godots\" ]; then echo 'already installed'; else mkdir -p \"$HOME/.local/share/godots\" \"$HOME/.local/bin\" && curl -fLo /tmp/godots.zip https://github.com/MakovWait/godots/releases/latest/download/LinuxX11.zip && unzip -o /tmp/godots.zip -d \"$HOME/.local/share/godots\" && chmod +x \"$HOME/.local/share/godots/Godots.x86_64\" && ln -sf \"$HOME/.local/share/godots/Godots.x86_64\" \"$HOME/.local/bin/godots\" && rm /tmp/godots.zip; fi"
nixos.source = "manual"
nixos.url = "https://github.com/MakovWait/godots/releases (linux binary needs nix-ld or FHS env on nixos)"
termux.source = "unsupported"
termux.reason = "no GUI on android"

# ============================================================
# Groups (bulk install: install.py --group <name>)
# ============================================================

[groups]
desktop  = ["sway", "swayidle", "swaybg", "swaylock-effects", "waybar", "wofi", "networkmanager-dmenu", "pavucontrol"]
terminal = ["ghostty", "tmux", "zsh", "starship", "zoxide", "tealdeer", "glow", "fzf", "bat"]
shells   = ["zsh", "xonsh"]
editor   = ["neovim", "gcc", "gnumake", "unzip", "ripgrep", "fd", "wl-clipboard", "nodejs"]
fonts    = ["nerd-fonts-0xproto"]
dotfiles = ["stow", "git", "gh", "jq"]
ai       = ["claude-code", "opencode", "pi", "hermes", "graphify"]
pipeline   = ["uv", "python", "pango", "cairo", "gdk-pixbuf", "libffi"]
containers = ["docker"]
games      = ["godots"]
notes      = ["obsidian", "notesmd-cli"]

# ============================================================
# Profiles (opt-in via --profile <name>)
# ============================================================

# Server / headless install: drop wayland desktop stack, fonts (no renderer),
# and ghostty (GPU terminal needs display). Keep terminal-shell pkgs, editor,
# dotfiles, ai, pipeline.
[profiles.server]
exclude_groups = ["desktop", "fonts", "games"]
exclude        = ["ghostty", "wl-clipboard"]
